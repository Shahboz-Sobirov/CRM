openapi: 3.0.3
info:
  title: Oxford CRM API
  version: 1.0.0
  description: School Management System API for managing students, teachers, classes,
    attendance, and payments
paths:
  /api/attendance/:
    get:
      operationId: attendance_list
      description: Get a list of all attendance records. Parents see only their children's
        attendance, teachers see attendance for their groups.
      summary: List all attendance records
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Filter by date (YYYY-MM-DD)
      - in: query
        name: group
        schema:
          type: integer
        description: Filter by group ID
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: student
        schema:
          type: integer
        description: Filter by student ID
      tags:
      - Attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttendanceListList'
          description: ''
    post:
      operationId: attendance_create
      description: Create a new attendance record (Manager/Admin/Teacher for owned
        groups)
      summary: Create attendance record
      tags:
      - Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttendanceCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceCreate'
          description: ''
  /api/attendance/{id}/:
    get:
      operationId: attendance_retrieve
      description: Retrieve details of a specific attendance record
      summary: Get attendance details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    put:
      operationId: attendance_update
      description: Update attendance record (Manager/Admin/Teacher for owned groups)
      summary: Update attendance
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    patch:
      operationId: attendance_partial_update
      description: Partially update attendance record (Manager/Admin/Teacher for owned
        groups)
      summary: Partially update attendance
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    delete:
      operationId: attendance_destroy
      description: Delete an attendance record (Manager/Admin/Teacher for owned groups)
      summary: Delete attendance
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/attendance/mark/:
    post:
      operationId: attendance_mark_create
      description: Mark attendance for multiple students in a group on a specific
        date (Manager/Admin/Teacher for owned groups)
      summary: Bulk mark attendance
      tags:
      - Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkAttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkAttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkAttendanceRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Invalid data
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Group not found
          description: ''
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: Change the password for the currently authenticated user
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                description: Password changed successfully
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Invalid password
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Obtain JWT access and refresh tokens
      summary: Login
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Get the currently authenticated user information
      summary: Get current user
      tags:
      - Authentication
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Create a new user account with email and password
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/users/:
    get:
      operationId: auth_users_list
      description: Get a list of all users (Admin only)
      summary: List all users
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
    post:
      operationId: auth_users_create
      description: Create a new user account (Admin only)
      summary: Create a new user
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreate'
          description: ''
  /api/auth/users/{id}/:
    get:
      operationId: auth_users_retrieve
      description: Retrieve details of a specific user (Admin only)
      summary: Get user details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_users_update
      description: Update user information (Admin only)
      summary: Update user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_users_partial_update
      description: Partially update user information (Admin only)
      summary: Partially update user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    delete:
      operationId: auth_users_destroy
      description: Delete a user account (Admin only)
      summary: Delete user
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Users
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/classes/:
    get:
      operationId: classes_list
      description: Get a list of all groups/classes. Teachers see only their groups,
        parents see groups their children are in.
      summary: List all groups
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
        description: Filter by active status
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Groups
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGroupListList'
          description: ''
    post:
      operationId: classes_create
      description: Create a new group/class (Manager/Admin only)
      summary: Create a new group
      tags:
      - Groups
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCreate'
          description: ''
  /api/classes/{id}/:
    get:
      operationId: classes_retrieve
      description: Retrieve details of a specific group/class
      summary: Get group details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Groups
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: ''
    put:
      operationId: classes_update
      description: Update group information (Manager/Admin only)
      summary: Update group
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Groups
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GroupRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GroupRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: ''
    patch:
      operationId: classes_partial_update
      description: Partially update group information (Manager/Admin only)
      summary: Partially update group
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Groups
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedGroupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedGroupRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedGroupRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: ''
    delete:
      operationId: classes_destroy
      description: Delete a group/class (Manager/Admin only)
      summary: Delete group
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Groups
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/classes/{id}/students/:
    get:
      operationId: classes_students_list
      description: 'GET: List all students in a group. POST: Add a student to a group
        (Manager/Admin only)'
      summary: Manage group students
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: pk
        schema:
          type: integer
        description: Group ID
        required: true
      tags:
      - Groups
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentList'
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Permission denied
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Group not found
          description: ''
    post:
      operationId: classes_students_create
      description: 'GET: List all students in a group. POST: Add a student to a group
        (Manager/Admin only)'
      summary: Manage group students
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: pk
        schema:
          type: integer
        description: Group ID
        required: true
      tags:
      - Groups
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStudentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddStudentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddStudentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentList'
          description: ''
        '403':
          content:
            application/json:
              schema:
                description: Permission denied
          description: ''
        '404':
          content:
            application/json:
              schema:
                description: Group not found
          description: ''
  /api/payments/:
    get:
      operationId: payments_list
      description: Get a list of all payments. Parents see only their children's payments,
        teachers see payments for students in their groups.
      summary: List all payments
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Payments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentListList'
          description: ''
    post:
      operationId: payments_create
      description: Create a new payment record (Manager/Admin only)
      summary: Create a new payment
      tags:
      - Payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentCreate'
          description: ''
  /api/payments/{id}/:
    get:
      operationId: payments_retrieve
      description: Retrieve details of a specific payment
      summary: Get payment details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Payments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
    put:
      operationId: payments_update
      description: Update payment information (Manager/Admin only)
      summary: Update payment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
    patch:
      operationId: payments_partial_update
      description: Partially update payment information (Manager/Admin only)
      summary: Partially update payment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Payments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPaymentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPaymentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPaymentRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
    delete:
      operationId: payments_destroy
      description: Delete a payment record (Manager/Admin only)
      summary: Delete payment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Payments
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/payments/{id}/approve/:
    post:
      operationId: payments_approve_create
      description: Mark a payment as completed (Admin only)
      summary: Approve payment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: pk
        schema:
          type: integer
        description: Payment ID
        required: true
      tags:
      - Payments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
  /api/payments/{id}/reject/:
    post:
      operationId: payments_reject_create
      description: Mark a payment as cancelled (Admin only)
      summary: Reject payment
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: pk
        schema:
          type: integer
        description: Payment ID
        required: true
      tags:
      - Payments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
          description: ''
  /api/payments/statistics/:
    get:
      operationId: payments_statistics_retrieve
      description: Get aggregated payment statistics including total amount, total
        payments, completed and pending payments (Manager/Admin only)
      summary: Get payment statistics
      tags:
      - Payments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                PaymentStatistics:
                  value:
                    total_amount: 150000.0
                    total_payments: 45
                    completed_payments: 40
                    pending_payments: 5
                    cancelled_payments: 0
                  summary: Payment statistics
          description: ''
  /api/students/:
    get:
      operationId: students_list
      description: Get a list of all students. Parents see only their children, teachers
        see students in their groups.
      summary: List all students
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Students
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStudentListList'
          description: ''
    post:
      operationId: students_create
      description: Create a new student record (Manager/Admin only)
      summary: Create a new student
      tags:
      - Students
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StudentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StudentCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
